- name: configure backend server
  hosts: backend
  become: yes
  tasks:
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs 20
    package:
      name: nodejs
      state: present
  - name: create backend expense user
    user:
      name: expense
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "expense System user"
  - name: remove app directory
    file:
      path: /app
      state: absent
  - name: delete backend.zip in tmp directory
    file:
      path: /tmp/backend.zip
      state: absent
  - name: create app directory
    file:
      path: /app
      state: directory
  - name: download backend
    get_url:
      url: https://raw.githubusercontent.com/daws-90s/expense-documentation/refs/heads/main/artifacts/expense-backend-v3.tar.gz 
      dest: /tmp/backend.zip
  - name: unzip backend
    unarchive:
      src: /tmp/backend.zip
      dest: /app
      remote_src: yes
  - name: install dependencies
    community.general.npm:
      path: /app
  - name: copy backend service
    template:
      src: backend.service.j2
      dest: /etc/systemd/system/backend.service
  - name: install python dependencies
    pip:
      name: PyMySQL
      executable: pip3.9

  - name: install mysql client
    package:
    name: mysql
    state: present

  - name: load mysql data
    community.mysql.mysql_db:
      state: import
      name: all
      login_user: root
      login_password: RoboShop@1
      login_host: "{{ MYSQL_HOST }}"
      target: /app/schema/backend.sql
      
  - name: deamon reload
    systemd_service:
      name: backend
      daemon_reload: true
  - name: enable and start backend
    service:
      name: backend
      state: restarted
      enabled: yes