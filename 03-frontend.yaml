---
- name: Configure Frontend Server
  hosts: frontend
  become: yes

  vars:
    frontend_url: https://raw.githubusercontent.com/daws-90s/expense-documentation/refs/heads/main/artifacts/expense-frontend-v3.tar.gz
    web_root: /usr/share/nginx/html

  tasks:
    - name: Enable Nginx module
      command: dnf module enable nginx:1.24 -y

    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Remove old web root
      file:
        path: "{{ web_root }}"
        state: absent

    - name: Create web root
      file:
        path: "{{ web_root }}"
        state: directory

    - name: Download frontend
      get_url:
        url: "{{ frontend_url }}"
        dest: /tmp/frontend.tar.gz

    - name: Extract frontend
      unarchive:
        src: /tmp/frontend.tar.gz
        dest: "{{ web_root }}"
        remote_src: yes

    - name: Copy expense nginx config
      template:
        src: expense.conf.j2
        dest: /etc/nginx/conf.d/expense.conf
      notify: Restart nginx

    - name: Enable nginx
      service:
        name: nginx
        enabled: yes
        state: started

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted