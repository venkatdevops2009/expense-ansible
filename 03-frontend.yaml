---
- name: Configure Frontend Server
  hosts: frontend
  become: yes

  vars:
    frontend_url: https://raw.githubusercontent.com/daws-90s/expense-documentation/refs/heads/main/artifacts/expense-frontend-v3.tar.gz
    web_root: /usr/share/nginx/html

  tasks:

    - name: Remove nginx package
      dnf:
        name: nginx
        state: absent

    - name: Remove nginx configuration directory
      file:
        path: /etc/nginx
        state: absent

    - name: Remove nginx cache
      file:
        path: /var/cache/nginx
        state: absent
      ignore_errors: yes

    - name: Remove web root
      file:
        path: "{{ web_root }}"
        state: absent

    - name: Enable nginx module
      command: dnf module enable nginx:1.24 -y

    - name: Install nginx
      dnf:
        name: nginx
        state: present

    - name: Create web root
      file:
        path: "{{ web_root }}"
        state: directory

    - name: Download frontend artifact
      get_url:
        url: "{{ frontend_url }}"
        dest: /tmp/frontend.tar.gz

    - name: Extract frontend
      unarchive:
        src: /tmp/frontend.tar.gz
        dest: "{{ web_root }}"
        remote_src: yes

    - name: Copy nginx configuration
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'

    - name: Validate nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Display nginx test output
      debug:
        var: nginx_test.stderr_lines

    - name: Enable and restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes